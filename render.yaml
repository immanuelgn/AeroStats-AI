services:
  - type: web
    name: aerostats-ai-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: OPEN_METEO_BASE_URL
        value: https://api.open-meteo.com/v1
      - key: MAX_UPLOAD_MB
        value: "15"
